<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lofi Landing Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Hero Section -->
    <section id="hero">
        <div class="overlay">
            <h1>Welcome</h1>
            <p>Scroll to Enter</p>
            <div class="arrow">↓</div>
        </div>
    </section>

    <!-- Main Content -->
    <section id="content">
        <h2>Main Website</h2>
        <p>Your actual website starts here.</p>
    </section>

    <!-- iPod Music Player -->
    <div id="ipod">
        <div class="screen">
            <h3>Now Playing</h3>
            <p id="song-title">Lofi Mix</p>
        </div>

        <button id="play-btn">▶</button>

        <audio id="audio">
            <source src="music/lofi.mp3" type="audio/mpeg">
        </audio>
    </div>


</body>
</html>

<script src="script.js"></script>
</body>
</html>
